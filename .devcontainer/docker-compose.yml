services:
  librmcs-develop:
    image: qzhhhi/librmcs-develop:latest
    network_mode: host
    device_cgroup_rules:
      - "c 189:* rw"
    init: true
    command: /bin/sh -c "while sleep 1000; do :; done"
    working_dir: /home/ubuntu
    volumes:
      - type: bind
        source: /dev
        target: /dev
      - type: bind
        source: ..
        target: /workspaces/librmcs
