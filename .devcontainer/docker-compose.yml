services:
  librmcs-develop:
    image: qzhhhi/librmcs-develop:latest
    privileged: true
    network_mode: host
    init: true
    command: /bin/sh -c "while sleep 1000; do :; done"
    working_dir: /home/ubuntu
    devices:
      - /dev:/dev
    volumes:
      - type: bind
        source: /tmp/.X11-unix
        target: /tmp/.X11-unix
      - type: bind
        source: ..
        target: /workspaces/librmcs
